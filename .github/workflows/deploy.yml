name: Deploy Site

on:
  push:
    branches: [master, main]
  repository_dispatch:
    types: [docs-updated, version-released]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout website
        uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # ── Checkout opencli repo (needed for version + docs) ──
      - name: Checkout opencli repo
        uses: actions/checkout@v4
        with:
          repository: jackwener/opencli
          path: _opencli
          sparse-checkout: |
            docs
            package.json
            package-lock.json

      - name: Extract opencli version
        id: version
        run: |
          VERSION=$(node -p "require('./_opencli/package.json').version")
          echo "OPENCLI_VERSION=$VERSION" >> "$GITHUB_OUTPUT"

      # ── Build website ──
      - name: Install website dependencies
        run: npm ci

      - name: Fetch plugin metadata from GitHub
        run: node scripts/fetch-plugin-stars.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build website
        run: npm run build
        env:
          VITE_OPENCLI_VERSION: ${{ steps.version.outputs.OPENCLI_VERSION }}

      # ── Build docs ──
      - name: Install docs dependencies
        working-directory: _opencli
        run: npm ci

      - name: Build VitePress docs
        working-directory: _opencli
        run: npx vitepress build docs

      # ── Merge outputs ──
      - name: Merge website + docs into dist/
        run: cp -r _opencli/docs/.vitepress/dist dist/docs

      # ── Deploy ──
      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist


  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
